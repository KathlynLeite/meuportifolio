<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfólio | Operações & Dados</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React e Babel para rodar direto no navegador -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        
        // Ícones Lucide (Ajuste para rodar no browser)
        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        const PROJECTS_DATA = [
            {
                id: 1,
                title: "Otimização de Fluxo de Processos Industriais",
                category: "Eficiência Operacional",
                description: "Mapeamento e identificação de gargalos em fluxos produtivos, propondo reorganização de etapas para redução de tempo de espera.",
                deliverable: "Relatório de diagnóstico pronto para implementação e padronização de tarefas.",
                tech: ["Lean Manufacturing", "Visio", "Excel"],
                imageUrl: "https://images.unsplash.com/photo-1558444458-5cd055bd3a9c?q=80&w=800&auto=format&fit=crop",
                link: "#"
            },
            {
                id: 2,
                title: "Automação de Relatórios de Performance",
                category: "Análise de Dados",
                description: "Estruturação de base de dados para atualização automática de indicadores de produtividade, eliminando o preenchimento manual diário.",
                deliverable: "Dashboard interativo com KPIs de fácil leitura para tomada de decisão rápida.",
                tech: ["Python", "SQL", "Power BI"],
                imageUrl: "https://images.unsplash.com/photo-1460925895917-afdab827c52f?q=80&w=800&auto=format&fit=crop",
                link: "#"
            },
            {
                id: 3,
                title: "Gestão e Controle de Estoque Operacional",
                category: "Suporte Logístico",
                description: "Criação de sistema de monitoramento de entradas e saídas com alertas de estoque crítico e análise de giro de materiais.",
                deliverable: "Planilha inteligente com automação de pedidos e histórico de consumo.",
                tech: ["Excel Avançado", "Análise de Dados", "ERP Support"],
                imageUrl: "https://images.unsplash.com/photo-1553413077-190dd305871c?q=80&w=800&auto=format&fit=crop",
                link: "#"
            }
        ];

        const App = () => {
            const [scrolled, setScrolled] = useState(false);
            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 20);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            return (
                <div className="min-h-screen bg-[#0f172a] text-slate-200">
                    <nav className={`fixed w-full z-50 transition-all ${scrolled ? 'bg-[#0f172a]/95 border-b border-slate-800 py-3' : 'bg-transparent py-6'}`}>
                        <div className="container mx-auto px-6 flex justify-between items-center">
                            <div className="flex items-center gap-2 text-white">
                                <Icon name="settings" className="text-blue-500" />
                                <span className="text-xl font-bold italic">OPERATIONS_PRO</span>
                            </div>
                            <div className="hidden md:flex gap-8 text-xs font-bold uppercase tracking-widest text-slate-400">
                                <a href="#projects" className="hover:text-blue-400">Portfólio</a>
                                <a href="#skills" className="hover:text-blue-400">Competências</a>
                                <a href="#contact" className="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">Contratar</a>
                            </div>
                        </div>
                    </nav>

                    <section className="pt-32 pb-24 lg:pt-52 lg:pb-40 px-6">
                        <div className="container mx-auto max-w-4xl">
                            <div className="inline-block px-3 py-1 bg-blue-500/10 border border-blue-500/20 text-blue-400 text-[10px] font-bold uppercase mb-6">Foco em Resultados Práticos</div>
                            <h1 className="text-5xl md:text-7xl font-black text-white mb-8 leading-tight italic uppercase">Apoio estratégico em <span className="text-blue-500">Dados e Operações.</span></h1>
                            <p className="text-xl text-slate-400 mb-10 leading-relaxed">Transformo bases de dados complexas em ferramentas de gestão. Pronta para atuar como braço direito técnico em operações industriais e administrativas.</p>
                            <div className="flex gap-4">
                                <a href="#projects" className="px-8 py-4 bg-white text-slate-900 font-black rounded hover:bg-blue-500 hover:text-white transition-all uppercase text-sm">Ver Projetos</a>
                            </div>
                        </div>
                    </section>

                    <section id="projects" className="py-24 bg-[#0b1222] px-6">
                        <div className="container mx-auto">
                            <h2 className="text-3xl font-black text-white mb-12 uppercase italic">Soluções Desenvolvidas</h2>
                            <div className="grid md:grid-cols-3 gap-8">
                                {PROJECTS_DATA.map(p => (
                                    <div key={p.id} className="bg-slate-900 border border-slate-800 rounded-lg overflow-hidden flex flex-col">
                                        <img src={p.imageUrl} className="h-48 w-full object-cover" />
                                        <div className="p-6 flex-grow">
                                            <span className="text-blue-500 text-[10px] font-black uppercase">{p.category}</span>
                                            <h3 className="text-lg font-bold text-white mt-2 mb-4">{p.title}</h3>
                                            <p className="text-sm text-slate-400 mb-4">{p.description}</p>
                                            <div className="bg-slate-950 p-3 border-l-4 border-blue-600 text-xs mb-4 italic text-slate-300">
                                                <strong>Entrega:</strong> {p.deliverable}
                                            </div>
                                            <div className="flex flex-wrap gap-2">
                                                {p.tech.map(t => <span key={t} className="text-[9px] bg-slate-800 px-2 py-1 rounded border border-slate-700">{t}</span>)}
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    <section id="contact" className="py-24 px-6 text-center">
                        <div className="container mx-auto max-w-2xl bg-blue-600 p-12 rounded-2xl">
                            <h2 className="text-3xl font-black text-white mb-6 italic uppercase tracking-tighter">Precisa de suporte operacional?</h2>
                            <p className="text-blue-100 mb-8 font-medium">Estou pronta para integrar sua equipe e organizar seus processos.</p>
                            <a href="mailto:seuemail@exemplo.com" className="px-10 py-4 bg-slate-950 text-white font-black rounded hover:bg-white hover:text-slate-950 transition-all uppercase">Falar por E-mail</a>
                        </div>
                    </section>

                    <footer className="py-8 border-t border-slate-800 text-center text-[10px] text-slate-600 font-black uppercase tracking-widest">
                        © {new Date().getFullYear()} — Portfólio de Operações & Dados
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
